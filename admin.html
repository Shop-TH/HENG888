<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <meta name="color-scheme" content="dark"/>
  <meta name="theme-color" content="#0d0d0d"/>
  <title>HENG888 Admin</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
  <style>
    :root{
      --bg:#0d0d0d;--bg2:#161616;--bg3:#1e1e1e;--bg4:#252525;--bg5:#2c2c2c;
      --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
      --text:#ffffff;--text2:rgba(255,255,255,0.75);--text3:rgba(255,255,255,0.38);
      --gold:#f0c040;--gold2:#ffd966;--gold-bg:rgba(240,192,64,0.12);--gold-bd:rgba(240,192,64,0.28);
      --red:#ff4d4d;--red-bg:rgba(255,77,77,0.10);
      --green:#3ddc84;--grn-bg:rgba(61,220,132,0.10);
      --orange:#ff9933;--font:'Sarabun',sans-serif;--r:12px;--r-lg:18px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html{background:#0d0d0d !important;}
    html,body{background:var(--bg);overscroll-behavior:none;min-height:100vh;}
    body{font-family:var(--font);color:#ffffff;-webkit-font-smoothing:antialiased;line-height:1.7;background:#0d0d0d;}
    #root{background:#0d0d0d;min-height:100vh;}
    img{display:block;}button{font-family:var(--font);cursor:pointer;}
    .ti{font-size:inherit;line-height:1;vertical-align:-0.125em;}
    /* ── ORDER LIST COMPACT ── */
    .order-list-compact{display:flex;flex-direction:column;gap:6px;}
    .order-row{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:13px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .2s,background .2s;border-left:3px solid transparent;}
    .order-row:active{background:var(--bg3);}
    .order-row.status-wait{border-left-color:#ff4d4d;}
    .order-row.status-ok{border-left-color:#f0c040;}
    .order-row.status-done{border-left-color:#3ddc84;}
    .order-row.status-reject{border-left-color:rgba(255,255,255,0.15);}
    .or-left{flex:1;min-width:0;}
    .or-id{font-size:13px;font-weight:700;color:var(--gold2);margin-bottom:2px;}
    .or-name{font-size:13px;color:#ffffff;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .or-time{font-size:11px;color:var(--text3);}
    .or-right{text-align:right;flex-shrink:0;}
    .or-total{font-size:15px;font-weight:700;color:var(--gold2);margin-bottom:4px;}
    .or-badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;}
    .or-badge.wait{background:rgba(255,77,77,0.12);color:#ff4d4d;border:1px solid rgba(255,77,77,0.3);}
    .or-badge.ok{background:rgba(240,192,64,0.12);color:var(--gold);border:1px solid var(--gold-bd);}
    .or-badge.done{background:rgba(61,220,132,0.10);color:#3ddc84;border:1px solid rgba(61,220,132,0.25);}
    .or-badge.reject{background:rgba(255,255,255,0.05);color:var(--text3);border:1px solid var(--border);}
    .or-chevron{color:var(--text3);font-size:16px;margin-left:4px;}
    /* ── ORDER DETAIL MODAL ── */
    .od-section{margin-bottom:14px;}
    .od-section-lbl{font-size:10px;font-weight:600;color:var(--gold2);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
    .od-meta-row{display:flex;gap:8px;margin-bottom:6px;align-items:flex-start;}
    .od-meta-ico{font-size:15px;color:var(--text3);flex-shrink:0;margin-top:1px;}
    .od-meta-val{font-size:13px;color:var(--text2);line-height:1.6;}
    .od-items{background:var(--bg3);border-radius:var(--r);padding:10px 12px;}
    .od-item-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px;}
    .od-item-row:last-child{border-bottom:none;}
    .od-item-name{color:#ffffff;}
    .od-item-price{color:var(--gold2);font-weight:600;}
    .od-total-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0 4px;border-top:1px solid var(--border);margin-top:4px;}
    .od-total-lbl{font-size:12px;color:var(--text3);}
    .od-total-val{font-size:20px;font-weight:800;color:var(--gold2);}
    .od-timeline{display:flex;flex-direction:column;gap:10px;}
    .od-tl-row{display:flex;gap:10px;align-items:flex-start;}
    .od-tl-dot{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
    .od-tl-dot.active{border-color:var(--gold);background:var(--gold-bg);}
    .od-tl-dot.done{border-color:#3ddc84;background:rgba(61,220,132,0.1);}
    .od-tl-dot i{font-size:11px;}
    .od-tl-info{flex:1;}
    .od-tl-label{font-size:13px;color:#ffffff;font-weight:500;}
    .od-tl-time{font-size:11px;color:var(--text3);margin-top:1px;}
    /* ── STATUS PIPELINE (หลอดสถานะ) ── */
    .status-pipe{display:flex;align-items:center;gap:0;margin-bottom:16px;}
    .sp-step{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;}
    .sp-step::after{content:'';position:absolute;top:13px;left:50%;width:100%;height:2px;background:var(--border2);z-index:0;}
    .sp-step:last-child::after{display:none;}
    .sp-dot{width:26px;height:26px;border-radius:50%;border:2px solid var(--border2);background:var(--bg3);display:flex;align-items:center;justify-content:center;position:relative;z-index:1;flex-shrink:0;}
    .sp-dot.done{border-color:#3ddc84;background:rgba(61,220,132,0.15);}
    .sp-dot.done i{color:#3ddc84;}
    .sp-dot.active{border-color:var(--gold);background:rgba(240,192,64,0.15);}
    .sp-dot.active i{color:var(--gold);}
    .sp-dot.wait{border-color:var(--border2);background:var(--bg3);}
    .sp-dot.wait i{color:var(--text3);}
    .sp-dot.reject{border-color:#ff4d4d;background:rgba(255,77,77,0.12);}
    .sp-dot.reject i{color:#ff4d4d;}
    .sp-dot i{font-size:12px;}
    .sp-label{font-size:9px;color:var(--text3);text-align:center;white-space:nowrap;letter-spacing:0.3px;}
    .sp-label.done{color:#3ddc84;}
    .sp-label.active{color:var(--gold);font-weight:600;}
    .sp-time{font-size:9px;color:var(--text3);text-align:center;}
    .sp-line-fill{position:absolute;top:13px;left:50%;height:2px;background:linear-gradient(90deg,#3ddc84,#3ddc84);z-index:0;transition:width .3s;}

    /* ── COMPACT PRODUCT GRID ── */
    .prod-grid-compact{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .prod-card-compact{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;cursor:pointer;transition:border-color .2s;border-left:3px solid transparent;display:flex;flex-direction:column;}
    .prod-card-compact:active{background:var(--bg3);}
    .prod-card-compact.active-prod{border-left-color:var(--gold);}
    .prod-card-compact.inactive-prod{border-left-color:var(--border2);opacity:0.55;}
    .pc-img{width:100%;aspect-ratio:1;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
    .pc-img img{width:100%;height:100%;object-fit:cover;}
    .pc-img i{font-size:28px;color:var(--text3);}
    .pc-body{padding:8px 10px 10px;}
    .pc-brand{font-size:9px;letter-spacing:2px;color:var(--gold2);text-transform:uppercase;margin-bottom:2px;font-weight:600;}
    .pc-name{font-size:12px;font-weight:600;color:#ffffff;line-height:1.4;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:32px;}
    .pc-price{font-size:13px;font-weight:700;color:var(--gold2);}

    /* ── BRAND BAR ── */
    .brand-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;}
    .brand-bar::-webkit-scrollbar{display:none;}
    .bb-btn{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;font-family:var(--font);font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;transition:all .2s;white-space:nowrap;}
    .bb-btn.active{background:var(--gold-bg);border-color:var(--gold-bd);color:var(--gold2);}
    .bb-btn img{width:16px;height:16px;border-radius:50%;object-fit:cover;}

    /* ── STAT ICON สีทอง ── */
    .stat-ico{font-size:22px;margin-bottom:6px;color:var(--gold2);}
    .stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;}
    .stat-val{font-size:22px;font-weight:800;color:#ffffff;margin-bottom:2px;}
    .stat-lbl{font-size:11px;color:var(--text3);font-weight:400;}

    .order-filter::-webkit-scrollbar{display:none;}
    .of-btn{flex-shrink:0;padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;font-family:var(--font);font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;transition:all .2s;white-space:nowrap;}
    .of-btn.active-wait{background:rgba(255,77,77,0.12);color:#ff4d4d;border-color:rgba(255,77,77,0.3);}
    .of-btn.active-ok{background:rgba(240,192,64,0.12);color:var(--gold);border-color:var(--gold-bd);}
    .of-btn.active-done{background:rgba(61,220,132,0.10);color:#3ddc84;border-color:rgba(61,220,132,0.25);}
    .of-btn.active-all{background:var(--bg3);color:#ffffff;border-color:var(--border2);}
    .od-map-wrap{border-radius:var(--r);overflow:hidden;border:1px solid var(--border);margin-top:8px;}
    .od-map-wrap iframe{width:100%;height:150px;border:none;display:block;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
    @keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    #root{min-height:100vh;}
    .center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:32px;height:100vh;}
    .spinner{width:28px;height:28px;border:2.5px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
    .header{background:#0a0a0a;border-bottom:1px solid rgba(255,255,255,0.08);padding:12px 18px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;}
    .header-logo{font-size:20px;font-weight:800;color:#fafaf8;letter-spacing:2px;}
    .header-logo span{color:var(--gold2);}
    .header-role-name{font-size:11px;color:rgba(250,250,248,0.45);margin-top:2px;}
    .role-badge{border-radius:20px;padding:4px 12px;font-size:11px;font-weight:600;}
    .role-badge.superadmin{background:rgba(184,150,62,0.18);border:1px solid rgba(184,150,62,0.4);color:#d4ac58;}
    .role-badge.admin{background:rgba(39,174,96,0.18);border:1px solid rgba(39,174,96,0.4);color:#52d68a;}
    .tabs{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;position:sticky;top:53px;z-index:99;}
    .tab{flex:1;padding:13px 4px 11px;border:none;background:transparent;font-family:var(--font);font-size:10px;font-weight:600;cursor:pointer;color:var(--text3);border-bottom:3px solid transparent;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:4px;}
    .tab-icon{font-size:19px;}
    .tab.active{color:var(--gold);border-bottom-color:var(--gold);background:rgba(240,192,64,.06);}
    .tab:active{transform:scale(.95);}
    .content{padding:14px;padding-bottom:80px;}
    .btn{border:none;border-radius:var(--r);padding:9px 16px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:opacity .15s,transform .1s;}
    .btn:active{transform:scale(.95);}
    .btn-gold{background:var(--gold);color:#fff;}
    .btn-outline{background:transparent;border:1.5px solid var(--border2);color:rgba(255,255,255,0.7);}
    .btn-red{background:var(--red-bg);border:1px solid rgba(192,57,43,.25);color:var(--red);}
    .btn-green{background:var(--grn-bg);border:1px solid rgba(39,174,96,.25);color:var(--green);}
    .btn-gray{background:var(--bg3);border:1px solid var(--border2);color:rgba(255,255,255,0.65);}
    .btn-full{width:100%;padding:13px;justify-content:center;}
    .btn-sm{padding:6px 12px;font-size:12px;}
    .btn-icon{width:34px;height:34px;padding:0;justify-content:center;font-size:15px;border-radius:var(--r);}
    .btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important;}
    .form-group{margin-bottom:14px;}
    .form-label{display:block;font-size:11px;font-weight:600;color:var(--gold2);letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;}
    .form-input{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r);padding:11px 13px;font-family:var(--font);font-size:14px;color:#ffffff;outline:none;transition:border-color .2s;}
    .form-input:focus{border-color:var(--gold-bd);}
    .form-input::placeholder{color:var(--text3);}
    .form-textarea{resize:vertical;min-height:76px;line-height:1.6;}
    .form-select{appearance:none;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .toggle-wrap{display:flex;align-items:center;justify-content:space-between;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;}
    .toggle-lbl{font-size:13px;font-weight:600;color:#ffffff;}
    .toggle-sub{font-size:11px;color:var(--text3);margin-top:2px;}
    .toggle{width:44px;height:24px;border-radius:12px;cursor:pointer;position:relative;border:none;flex-shrink:0;transition:background .2s;}
    .toggle-knob{position:absolute;top:3px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.4);transition:left .2s;}
    .prod-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;border-left:3px solid transparent;}
    .prod-thumb{width:52px;height:52px;border-radius:var(--r);object-fit:cover;flex-shrink:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;}
    .prod-thumb img{width:100%;height:100%;object-fit:cover;}
    .prod-info{flex:1;min-width:0;}
    .prod-name{font-size:13px;font-weight:600;color:#ffffff;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .prod-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:4px;}
    .prod-price{font-size:13px;font-weight:700;color:var(--gold2);}
    .prod-actions{display:flex;flex-direction:column;gap:5px;flex-shrink:0;}
    .badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;}
    .badge-green{background:var(--grn-bg);color:var(--green);border:1px solid rgba(39,174,96,.2);}
    .badge-gray{background:var(--bg4);color:var(--text3);border:1px solid var(--border);}
    .badge-red{background:var(--red-bg);color:var(--red);border:1px solid rgba(192,57,43,.2);}
    .badge-gold{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-bd);}
    .brand-admin{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:10px;}
    .brand-admin-head{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
    .brand-admin-info{display:flex;align-items:center;gap:12px;}
    .brand-logo-thumb{width:48px;height:48px;border-radius:var(--r);overflow:hidden;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:24px;border:1px solid var(--border);flex-shrink:0;}
    .brand-logo-thumb img{width:100%;height:100%;object-fit:cover;}
    .brand-admin-name{font-size:16px;font-weight:700;color:#ffffff;}
    .brand-admin-sub{font-size:11px;color:var(--text3);margin-top:2px;}
    .brand-admin-body{padding:10px 16px;display:flex;flex-wrap:wrap;gap:6px;}
    .order-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;margin-bottom:10px;animation:fadeUp .35s both;}
    .order-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
    .order-id{font-size:15px;font-weight:800;color:var(--gold2);}
    .order-section{margin-bottom:10px;}
    .order-section-lbl{font-size:10px;font-weight:600;color:var(--gold2);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
    .order-meta-row{display:flex;gap:8px;margin-bottom:4px;align-items:flex-start;}
    .order-meta-ico{font-size:15px;flex-shrink:0;margin-top:1px;color:var(--text3);}
    .order-meta-val{font-size:13px;color:rgba(255,255,255,0.72);line-height:1.6;}
    .order-items{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-top:6px;}
    .order-item-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);}
    .order-item-row:last-child{border-bottom:none;}
    .order-item-name{font-size:13px;color:#ffffff;font-weight:500;}
    .order-item-qty{font-size:13px;color:var(--text2);}
    .order-item-price{font-size:13px;font-weight:700;color:var(--gold);}
    .order-total-row{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:10px;margin-top:6px;}
    .order-total-lbl{font-size:13px;color:var(--text2);}
    .order-total-val{font-size:18px;font-weight:800;color:var(--gold2);}
    .hide-price .order-item-price,.hide-price .order-total-row{display:none!important;}
    .order-foot{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
    .tracking-box{margin-top:10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;}
    .tracking-lbl{font-size:10px;font-weight:600;color:var(--gold2);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
    .tracking-inp{width:100%;background:var(--bg4);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-family:var(--font);font-size:13px;color:#ffffff;outline:none;transition:border-color .2s;margin-bottom:8px;}
    .tracking-inp:focus{border-color:var(--gold-bd);}
    .tracking-inp::placeholder{color:var(--text3);}
    .tracking-sent{font-size:12px;color:var(--green);display:flex;align-items:center;gap:6px;margin-top:4px;}
    .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
    .stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;}
    .stat-ico{font-size:22px;margin-bottom:6px;}
    .stat-val{font-size:22px;font-weight:800;color:#ffffff;margin-bottom:2px;}
    .stat-lbl{font-size:11px;color:var(--text3);font-weight:400;}
    .alert{background:rgba(211,84,0,.08);border:1px solid rgba(211,84,0,.2);border-radius:var(--r);padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--orange);}
    .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
    .modal{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:20px 18px 40px;animation:slideUp .3s ease;border-top:1px solid var(--border);}
    .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
    .modal-title{font-size:16px;font-weight:800;color:var(--gold);}

    .login-logo span{color:var(--gold);}

    .login-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-lg);padding:22px;width:100%;max-width:360px;}

</head>
<body>
<div id="root"></div>
<script type="module">
  import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import{getFirestore,doc,getDoc,setDoc,updateDoc,deleteDoc,collection,getDocs,onSnapshot,query,orderBy,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

  const FC={apiKey:"AIzaSyDJ8zikwztSXFHlP_Wh2yD0dkerM-8774U",authDomain:"heng888-c53cf.firebaseapp.com",projectId:"heng888-c53cf",storageBucket:"heng888-c53cf.firebasestorage.app",messagingSenderId:"644962406547",appId:"1:644962406547:web:dd07fe7c6d389c94eabd66"};
  const SHOP="shop_001";
  const SUPERADMIN_IDS=["7234688831"];
  const BOT="8869386184:AAHopsdsjU9kLdpyq55UJG3acCx8TDhdwA4";

  const app=initializeApp(FC);
  const db=getFirestore(app);
  const tg=window.Telegram?.WebApp||null;
  const fmt=n=>"฿"+Number(n).toLocaleString("th-TH");

  function getTgUser(){
    if(!tg)return null;
    if(tg.initDataUnsafe?.user?.id)return tg.initDataUnsafe.user;
    try{
      const p=new URLSearchParams(tg.initData||"");
      const u=p.get("user");
      if(u)return JSON.parse(decodeURIComponent(u));
    }catch{}
    return null;
  }

  let ADMIN=null;
  const isSuperAdmin=()=>ADMIN?.role==="superadmin";
  const isAdmin=()=>ADMIN?.role==="admin";

  async function checkAuth(){
    const U=getTgUser();
    if(U){
      const cid=String(U.id);
      if(SUPERADMIN_IDS.includes(cid)){
        ADMIN={chatId:cid,name:U.first_name||"Superadmin",role:"superadmin"};
        return true;
      }
      try{
        const snap=await Promise.race([
          getDoc(doc(db,"admins",cid)),
          new Promise(r=>setTimeout(()=>r(null),6000))
        ]);
        if(snap?.exists?.()&&snap.data().active){
          ADMIN={...snap.data(),chatId:cid};
          return true;
        }
      }catch(e){console.warn("Firestore auth:",e);}
      return false;
    }
    return "browser";
  }

  async function loadBrands(){const s=await getDocs(collection(db,"shops",SHOP,"brands"));return s.docs.map(d=>({docId:d.id,...d.data()}));}
  async function loadProducts(){const s=await getDocs(collection(db,"shops",SHOP,"products"));return s.docs.map(d=>({docId:d.id,...d.data()})).sort((a,b)=>(a.brand||"").localeCompare(b.brand||""));}
  async function loadOrders(){const s=await getDocs(collection(db,"orders"));return s.docs.map(d=>({docId:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));}
  async function loadBank(){try{const s=await getDoc(doc(db,"settings","bank"));if(s.exists())return s.data();}catch{}return{bankName:"กสิกรไทย",accountNumber:"123-4-56789-0",accountHolder:"HENG888",logoUrl:""};}
  async function saveBank(data){await setDoc(doc(db,"settings","bank"),{...data,updatedAt:serverTimestamp()},{merge:true});}
  async function saveProd(data,docId){const ref=docId?doc(db,"shops",SHOP,"products",docId):doc(db,"shops",SHOP,"products",data.id||Date.now().toString());await setDoc(ref,data,{merge:true});}
  async function delProd(docId){await deleteDoc(doc(db,"shops",SHOP,"products",docId));}
  async function saveBrand(data,docId){const ref=docId?doc(db,"shops",SHOP,"brands",docId):doc(db,"shops",SHOP,"brands",data.key||Date.now().toString());await setDoc(ref,data,{merge:true});}
  async function delBrand(docId){await deleteDoc(doc(db,"shops",SHOP,"brands",docId));}
  async function updateOrder(docId,status){await updateDoc(doc(db,"orders",docId),{status});}

  function cropCompress(file,size,quality){
    return new Promise((res,rej)=>{
      const r=new FileReader();r.onerror=rej;
      r.onload=ev=>{
        const img=new Image();img.onerror=rej;
        img.onload=()=>{
          const sq=Math.min(img.width,img.height);
          const sx=(img.width-sq)/2,sy=(img.height-sq)/2;
          const c=document.createElement("canvas");c.width=size;c.height=size;
          const ctx=c.getContext("2d");
          ctx.fillStyle="#f4f3ef";ctx.fillRect(0,0,size,size);
          ctx.drawImage(img,sx,sy,sq,sq,0,0,size,size);
          res(c.toDataURL("image/jpeg",quality));
        };img.src=ev.target.result;
      };r.readAsDataURL(file);
    });
  }

  function cropCompressBank(file){
    return new Promise((res,rej)=>{
      const r=new FileReader();r.onerror=rej;
      r.onload=ev=>{
        const img=new Image();img.onerror=rej;
        img.onload=()=>{
          // ✅ 300×300px PNG — คมชัด ไม่แตก เหมาะสำหรับโลโก้ธนาคาร
          const size=300;
          const sq=Math.min(img.width,img.height);
          const sx=(img.width-sq)/2,sy=(img.height-sq)/2;
          const c=document.createElement("canvas");c.width=size;c.height=size;
          const ctx=c.getContext("2d");
          // พื้นหลังโปร่งใส (PNG รองรับ)
          ctx.clearRect(0,0,size,size);
          ctx.drawImage(img,sx,sy,sq,sq,0,0,size,size);
          // PNG ไม่บีบอัด ไม่สูญเสียคุณภาพ
          res(c.toDataURL("image/png"));
        };img.src=ev.target.result;
      };r.readAsDataURL(file);
    });
  }

  let toastT=null;
  function toast(msg,type="success"){
    document.querySelector(".toast")?.remove();
    if(toastT)clearTimeout(toastT);
    const t=document.createElement("div");
    t.className="toast";t.textContent=msg;
    t.style.background=type==="success"?"#b8963e":type==="error"?"#c0392b":"#d35400";
    t.style.color="#fff";
    document.body.appendChild(t);
    toastT=setTimeout(()=>t.remove(),2500);
  }

  let S={view:"loading",tab:"orders",brands:[],products:[],orders:[],bank:{},modal:null,mdata:{},confirm:null};
  const set=p=>{S={...S,...p};render();};
  async function loadAll(){
    const[b,p,o,bk]=await Promise.all([loadBrands(),loadProducts(),loadOrders(),loadBank()]);
    S.brands=b;S.products=p;S.orders=o;S.bank=bk;
  }

  function render(){
    const r=document.getElementById("root");
    if(S.view==="loading"){r.innerHTML='<div class="center"><div class="spinner"></div><div style="color:var(--text3);font-size:13px;margin-top:8px">กำลังโหลด...</div></div>';return;}
    if(S.view==="denied"){r.innerHTML='<div class="center" style="background:var(--bg);min-height:100vh;"><div style="font-size:48px"><i class="ti ti-lock"></i></div><div style="font-size:18px;font-weight:700;color:var(--text);margin-top:12px;">ไม่มีสิทธิ์เข้าใช้งาน</div><div style="font-size:13px;color:var(--text3);margin-top:6px;">กรุณาเปิดผ่าน Telegram Bot ครับ</div></div>';return;}
    if(S.view==="browser"){r.innerHTML=browserHTML();bindBrowser();return;}

    const tabsHtml=isSuperAdmin()?
      '<button class="tab '+(S.tab==="orders"?"active":"")+'" data-tab="orders"><span class="tab-icon"><i class="ti ti-clipboard-list"></i></span><span>ออเดอร์</span></button>'+
      '<button class="tab '+(S.tab==="brands"?"active":"")+'" data-tab="brands"><span class="tab-icon"><i class="ti ti-tag"></i></span><span>แบรนด์</span></button>'+
      '<button class="tab '+(S.tab==="products"?"active":"")+'" data-tab="products"><span class="tab-icon"><i class="ti ti-package"></i></span><span>สินค้า</span></button>'+
      '<button class="tab '+(S.tab==="stats"?"active":"")+'" data-tab="stats"><span class="tab-icon"><i class="ti ti-chart-bar"></i></span><span>ภาพรวม</span></button>'+
      '<button class="tab '+(S.tab==="settings"?"active":"")+'" data-tab="settings"><span class="tab-icon"><i class="ti ti-settings"></i></span><span>ตั้งค่า</span></button>'
      :'<button class="tab active" data-tab="orders"><span class="tab-icon"><i class="ti ti-clipboard-list"></i></span><span>ออเดอร์</span></button>';

    let content="";
    if(S.tab==="orders")content=tabOrders();
    else if(S.tab==="brands"&&isSuperAdmin())content=tabBrands();
    else if(S.tab==="products"&&isSuperAdmin())content=tabProds();
    else if(S.tab==="stats"&&isSuperAdmin())content=tabStats();
    else if(S.tab==="settings"&&isSuperAdmin())content=tabSettings();

    r.innerHTML=
      '<div class="header">'+
        '<div><div class="header-logo">HENG<span>888</span></div><div class="header-role-name">'+(ADMIN?.name||"Admin")+'</div></div>'+
        '<span class="role-badge '+(ADMIN?.role||"admin")+'">'+(isSuperAdmin()?"Superadmin":"Admin")+'</span>'+
      '</div>'+
      '<div class="tabs">'+tabsHtml+'</div>'+
      '<div class="content">'+content+'</div>'+
      (S.modal?modalHTML():"")+
      (S.confirm?confirmHTML():"");
    bindMain();if(S.modal)bindModal();if(S.confirm)bindConfirm();
  }

  const browserHTML=()=>'<div class="login-wrap"><div class="login-logo">HENG<span>888</span></div><div class="login-sub">กรอก Chat ID เพื่อเข้าใช้งานครับ</div><div class="login-box"><div class="form-group"><label class="form-label">Chat ID</label><input class="form-input" id="cid-in" type="number" placeholder="เช่น 123456789"/></div><button class="btn btn-gold btn-full" id="do-login">เข้าสู่ระบบ</button></div></div>';

  function bindBrowser(){
    document.getElementById("do-login")?.addEventListener("click",async()=>{
      const cid=document.getElementById("cid-in")?.value.trim();
      if(!cid)return toast("กรุณากรอก Chat ID ครับ","error");
      set({view:"loading"});
      if(SUPERADMIN_IDS.includes(cid)){ADMIN={chatId:cid,name:"Superadmin",role:"superadmin"};await loadAll();set({view:"main"});toast("เข้าสู่ระบบแล้วครับ");return;}
      try{const snap=await getDoc(doc(db,"admins",cid));if(snap.exists()&&snap.data().active){ADMIN={...snap.data(),chatId:cid};await loadAll();set({view:"main"});toast("เข้าสู่ระบบแล้วครับ");}else{set({view:"browser"});toast("ไม่พบ Chat ID นี้ครับ","error");}}
      catch{set({view:"browser"});toast("เกิดข้อผิดพลาดครับ","error");}
    });
  }

  // ── helper: แปลง Firestore timestamp → วัน/เวลาไทย ──
  function fmtDate(ts){
    if(!ts) return "-";
    const d=ts.seconds?new Date(ts.seconds*1000):new Date(ts);
    return d.toLocaleDateString("th-TH",{day:"2-digit",month:"short",year:"2-digit"})+
           " "+d.toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"});
  }

  // ── Auto-refresh orders — polling ทุก 10 วิ + refresh เมื่อ tab กลับมา ──
  let _pollTimer=null;
  let _lastRefresh=0;

  async function refreshOrders(force=false){
    const now=Date.now();
    if(!force&&now-_lastRefresh<8000) return; // throttle
    _lastRefresh=now;
    try{
      S.orders=await loadOrders();
      if(S.view==="main"&&S.tab==="orders") set({});
    }catch(e){console.warn("refreshOrders error:",e);}
  }

  function startOrdersListener(){
    if(_pollTimer) return; // เริ่มแล้ว
    // ① poll ทุก 10 วิ
    _pollTimer=setInterval(()=>refreshOrders(),10000);
    // ② refresh ทันทีเมื่อ tab กลับมา visible
    document.addEventListener("visibilitychange",()=>{
      if(document.visibilityState==="visible") refreshOrders(true);
    });
    // ③ ลอง onSnapshot ด้วย (ถ้า Firestore Rules อนุญาต จะ realtime ด้วย)
    try{
      const q=query(collection(db,"orders"),orderBy("createdAt","desc"));
      const unsub=onSnapshot(q,snap=>{
        S.orders=snap.docs.map(d=>({docId:d.id,...d.data()}));
        _lastRefresh=Date.now();
        if(S.view==="main"&&S.tab==="orders") set({});
      },err=>{
        // onSnapshot ไม่ได้ — ใช้ poll อย่างเดียวก็พอ
        console.warn("onSnapshot denied, using poll only:",err.code);
      });
    }catch(e){
      console.warn("onSnapshot init error:",e);
    }
  }

  function tabOrders(){
    // filter state
    const fil=S.orderFilter||"all";
    const filtered=S.orders.filter(o=>{
      if(fil==="wait") return !o.status||o.status==="รอตรวจสอบ";
      if(fil==="ok")   return o.status==="ยืนยันแล้ว";
      if(fil==="done") return o.status==="จัดส่งแล้ว"||!!o.trackingUrl;
      return true;
    });

    const counts={
      all:S.orders.length,
      wait:S.orders.filter(o=>!o.status||o.status==="รอตรวจสอบ").length,
      ok:S.orders.filter(o=>o.status==="ยืนยันแล้ว").length,
      done:S.orders.filter(o=>o.status==="จัดส่งแล้ว"||!!o.trackingUrl).length,
    };

    const filterBar=
      '<div class="order-filter">'+
      '<button class="of-btn '+(fil==="all"?"active-all":"")+'" data-fil="all">ทั้งหมด ('+counts.all+')</button>'+
      '<button class="of-btn '+(fil==="wait"?"active-wait":"")+'" data-fil="wait">รอยืนยัน ('+counts.wait+')</button>'+
      '<button class="of-btn '+(fil==="ok"?"active-ok":"")+'" data-fil="ok">ยืนยันแล้ว ('+counts.ok+')</button>'+
      '<button class="of-btn '+(fil==="done"?"active-done":"")+'" data-fil="done">ส่งแล้ว ('+counts.done+')</button>'+
      '</div>';

    const getStatusCls=o=>{
      if(!o.status||o.status==="รอตรวจสอบ") return "wait";
      if(o.status==="ยืนยันแล้ว"&&!o.trackingUrl) return "ok";
      if(o.trackingUrl||o.status==="จัดส่งแล้ว") return "done";
      if(o.status==="ปฏิเสธ") return "reject";
      return "wait";
    };
    const getStatusLabel=o=>{
      if(!o.status||o.status==="รอตรวจสอบ") return '<i class="ti ti-clock" style="font-size:10px;"></i> รอยืนยัน';
      if(o.status==="ยืนยันแล้ว"&&!o.trackingUrl) return '<i class="ti ti-check" style="font-size:10px;"></i> ยืนยันแล้ว';
      if(o.trackingUrl||o.status==="จัดส่งแล้ว") return '<i class="ti ti-truck-delivery" style="font-size:10px;"></i> ส่งแล้ว';
      if(o.status==="ปฏิเสธ") return '<i class="ti ti-x" style="font-size:10px;"></i> ปฏิเสธ';
      return o.status;
    };

    const rows=filtered.map(o=>{
      const sc=getStatusCls(o);
      const totalShow=isSuperAdmin()?fmt(o.total||0):"";
      return'<div class="order-row status-'+sc+'" data-view-order="'+o.docId+'">'+
        '<div class="or-left">'+
          '<div class="or-id">'+(o.orderId||o.docId)+'</div>'+
          '<div class="or-name">'+(o.customerName||"ลูกค้า")+(o.username?" · @"+o.username:"")+'</div>'+
          '<div class="or-time"><i class="ti ti-clock" style="font-size:11px;"></i> '+fmtDate(o.createdAt)+'</div>'+
        '</div>'+
        '<div class="or-right">'+
          (isSuperAdmin()?'<div class="or-total">'+totalShow+'</div>':"")+
          '<span class="or-badge '+sc+'">'+getStatusLabel(o)+'</span>'+
        '</div>'+
        '<i class="ti ti-chevron-right or-chevron"></i>'+
      '</div>';
    }).join("")||'<div class="empty"><i class="ti ti-clipboard-off" style="font-size:40px;margin-bottom:10px;display:block;"></i><div>ไม่มีออเดอร์</div></div>';

    const notice=isAdmin()?'<div class="role-notice"><i class="ti ti-user-shield"></i> ราคาถูกซ่อน — เห็นเฉพาะรายละเอียดสินค้าและข้อมูลจัดส่ง</div>':"";
    return notice+
      '<div class="card-head">'+
        '<div>'+
          '<div class="card-title">ออเดอร์</div>'+
          '<div style="font-size:10px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:4px;">'+
            '<i class="ti ti-refresh" style="font-size:11px;"></i> รีเฟรชอัตโนมัติทุก 10 วิ'+
          '</div>'+
        '</div>'+
        '<button class="btn btn-gold btn-sm" id="refresh-orders"><i class="ti ti-refresh"></i> รีเฟรช</button>'+
      '</div>'+
      filterBar+
      '<div class="order-list-compact">'+rows+'</div>';
  }

  // ── ORDER DETAIL MODAL ──
  function orderDetailModal(docId){
    const o=S.orders.find(x=>x.docId===docId);
    if(!o) return;

    const getStatusCls=()=>{
      if(!o.status||o.status==="รอตรวจสอบ") return "wait";
      if(o.status==="ยืนยันแล้ว"&&!o.trackingUrl) return "ok";
      if(o.trackingUrl) return "done";
      if(o.status==="ปฏิเสธ") return "reject";
      return "wait";
    };

    const itemsHtml=(o.items||[]).map(i=>
      '<div class="od-item-row">'+
        '<span class="od-item-name">'+i.name+' ×'+i.qty+'</span>'+
        (isSuperAdmin()?'<span class="od-item-price">'+fmt(i.price*i.qty)+'</span>':'')+
      '</div>'
    ).join("");

    const locHtml=o.location?
      '<div class="od-map-wrap"><iframe src="https://maps.google.com/maps?q='+o.location.lat+','+o.location.lng+'&z=16&output=embed" loading="lazy"></iframe></div>'+
      '<a href="https://maps.google.com/?q='+o.location.lat+','+o.location.lng+'" target="_blank" style="font-size:12px;color:var(--gold);text-decoration:none;display:inline-flex;align-items:center;gap:4px;margin-top:6px;"><i class="ti ti-map-2"></i> เปิดใน Google Maps</a>':"";

    // timeline
    const tlOrdered='<div class="od-tl-row"><div class="od-tl-dot done"><i class="ti ti-check" style="color:#3ddc84;"></i></div><div class="od-tl-info"><div class="od-tl-label">สั่งซื้อแล้ว</div><div class="od-tl-time">'+fmtDate(o.createdAt)+'</div></div></div>';
    const tlConfirm=o.confirmedAt||o.status==="ยืนยันแล้ว"||o.trackingUrl?
      '<div class="od-tl-row"><div class="od-tl-dot done"><i class="ti ti-check" style="color:#3ddc84;"></i></div><div class="od-tl-info"><div class="od-tl-label">ยืนยันออเดอร์</div><div class="od-tl-time">'+(o.confirmedAt?fmtDate(o.confirmedAt):"ยืนยันแล้ว")+'</div></div></div>':
      '<div class="od-tl-row"><div class="od-tl-dot"><i class="ti ti-clock" style="color:var(--text3);"></i></div><div class="od-tl-info"><div class="od-tl-label" style="color:var(--text3);">รอยืนยัน</div></div></div>';
    const tlShip=o.trackingUrl?
      '<div class="od-tl-row"><div class="od-tl-dot done"><i class="ti ti-truck-delivery" style="color:#3ddc84;"></i></div><div class="od-tl-info"><div class="od-tl-label">ส่งของแล้ว</div><div class="od-tl-time">'+(o.trackingSentAt?fmtDate(o.trackingSentAt):"ส่งลิงก์แล้ว")+'</div></div></div>':
      '<div class="od-tl-row"><div class="od-tl-dot"><i class="ti ti-truck-delivery" style="color:var(--text3);"></i></div><div class="od-tl-info"><div class="od-tl-label" style="color:var(--text3);">รอส่งของ</div></div></div>';

    const actionBtns=isSuperAdmin()&&(!o.status||o.status==="รอตรวจสอบ")?
      '<div style="display:flex;gap:8px;margin-top:14px;">'+
        '<button class="btn btn-green btn-full" data-co="'+o.docId+'" data-cid="'+o.chatId+'"><i class="ti ti-check"></i> ยืนยันออเดอร์</button>'+
        '<button class="btn btn-red" data-ro="'+o.docId+'" style="min-width:80px;"><i class="ti ti-x"></i> ปฏิเสธ</button>'+
      '</div>':"";

    const trackingBox=(o.status==="ยืนยันแล้ว"&&o.chatId&&o.chatId!=="guest")?
      '<div class="tracking-box" style="margin-top:14px;"><div class="tracking-lbl"><i class="ti ti-link"></i> ส่งลิงก์ติดตาม Rider</div>'+
      '<input class="tracking-inp" id="trk-'+o.docId+'" placeholder="https://track.grab.com/..." value="'+(o.trackingUrl||"")+'"/>'+
      '<div style="display:flex;gap:8px;align-items:center;">'+
        '<button class="btn btn-gold btn-full" data-send-trk="'+o.docId+'" data-cid="'+o.chatId+'" data-oid="'+(o.orderId||o.docId)+'"><i class="ti ti-send"></i> ส่งให้ลูกค้า</button>'+
        (o.trackingUrl?'<div class="tracking-sent"><i class="ti ti-circle-check"></i> ส่งแล้ว</div>':"")+
      '</div></div>':"";

    // ── pipeline สถานะ ──
    const isOrdered=true;
    const isConfirmed=!!(o.confirmedAt||o.status==="ยืนยันแล้ว"||o.trackingUrl);
    const isShipped=!!(o.trackingUrl||o.status==="จัดส่งแล้ว");
    const isRejected=o.status==="ปฏิเสธ";

    function spStep(dotCls,icon,label,time){
      return'<div class="sp-step">'+
        '<div class="sp-dot '+dotCls+'"><i class="ti ti-'+icon+'"></i></div>'+
        '<span class="sp-label '+dotCls+'">'+label+'</span>'+
        (time?'<span class="sp-time">'+time+'</span>':'')+
      '</div>';
    }
    const pipe=isRejected?
      '<div class="status-pipe">'+
        spStep("done","check","สั่งซื้อ",fmtDate(o.createdAt))+
        spStep("reject","x","ปฏิเสธ","")+
      '</div>':
      '<div class="status-pipe">'+
        spStep("done","check","สั่งซื้อ",fmtDate(o.createdAt))+
        spStep(isConfirmed?"done":"active","check",isConfirmed?"ยืนยัน":"รอยืนยัน",isConfirmed?fmtDate(o.confirmedAt):"")+
        spStep(isShipped?"done":"wait","truck-delivery","ส่งของ",isShipped?fmtDate(o.trackingSentAt):"")+
      '</div>';

    const sc=getStatusCls();
    const body=
      // ── header + pipeline ──
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">'+
        '<div class="order-id">'+(o.orderId||o.docId)+'</div>'+
        '<span class="or-badge '+sc+'">'+

           sc==="ok"?'<i class="ti ti-check" style="font-size:10px;"></i> ยืนยันแล้ว':
           sc==="done"?'<i class="ti ti-truck-delivery" style="font-size:10px;"></i> ส่งแล้ว':
           '<i class="ti ti-x" style="font-size:10px;"></i> ปฏิเสธ')+
        '</span>'+
      '</div>'+
      // หลอดสถานะ
      pipe+

      '<div class="od-section"><div class="od-section-lbl"><i class="ti ti-user"></i> ข้อมูลลูกค้า</div>'+
        '<div class="od-meta-row"><span class="od-meta-ico"><i class="ti ti-user"></i></span><span class="od-meta-val">'+(o.customerName||"-")+(o.username?" · @"+o.username:"")+'</span></div>'+
        '<div class="od-meta-row"><span class="od-meta-ico"><i class="ti ti-phone"></i></span><span class="od-meta-val">'+(o.phone||"-")+'</span></div>'+
        '<div class="od-meta-row"><span class="od-meta-ico"><i class="ti ti-home"></i></span><span class="od-meta-val">'+(o.address||"-")+'</span></div>'+
        (o.note?'<div class="od-meta-row"><span class="od-meta-ico"><i class="ti ti-message"></i></span><span class="od-meta-val">'+o.note+'</span></div>':"")+
        locHtml+
      '</div>'+

      '<div class="od-section"><div class="od-section-lbl"><i class="ti ti-package"></i> รายการสินค้า</div>'+
        '<div class="od-items">'+itemsHtml+'</div>'+
        (isSuperAdmin()?'<div class="od-total-row"><span class="od-total-lbl">ยอดรวม</span><span class="od-total-val">'+fmt(o.total||0)+'</span></div>':"")+
      '</div>'+

      actionBtns+trackingBox;

    // inject modal
    S.modal="order_detail";
    S.mdata={...o,_body:body};
    set({});
  }

        '<div class="toggle-wrap" style="margin-bottom:16px"><div><div class="toggle-lbl">แสดงสินค้า</div><div class="toggle-sub">ลูกค้าจะเห็นสินค้านี้</div></div>'+
        '<button class="toggle" id="f-toggle" style="background:'+(d.active!==false?"var(--gold)":"var(--bg5)")+'"><div class="toggle-knob" style="left:'+(d.active!==false?22:3)+'px"></div></button></div>'+
        '<button class="btn btn-gold btn-full" id="save-prod"><i class="ti ti-device-floppy"></i> บันทึกสินค้า</button>';
    }
    if(S.modal==="add_brand"||S.modal==="edit_brand"){
      title=(S.modal==="add_brand"?"เพิ่มแบรนด์":"แก้ไขแบรนด์");
      const logoBlock=d.logoUrl?
        '<div class="logo-preview-wrap"><img class="logo-preview-img" id="logo-preview" src="'+d.logoUrl+'"/><button class="logo-preview-change" onclick="document.getElementById(\'f-logo-file\').click()">เปลี่ยน Logo</button></div>':
        '<div class="logo-upload-zone" onclick="document.getElementById(\'f-logo-file\').click()"><div class="logo-upload-ico"><i class="ti ti-photo" style="font-size:28px;"></i></div><div class="logo-upload-txt">อัปโหลด Logo แบรนด์</div></div>';
      body='<div class="form-group"><label class="form-label">ชื่อแบรนด์ *</label><input class="form-input" id="f-bname" placeholder="เช่น DIOR" value="'+(d.name||"")+'"/></div>'+
        '<div class="form-group"><label class="form-label">คำอธิบาย</label><input class="form-input" id="f-bdesc" placeholder="น้ำหอมแบรนด์ High-end" value="'+(d.desc||"")+'"/></div>'+
        '<div class="form-group"><label class="form-label">Logo แบรนด์</label><div id="logo-wrap" style="display:flex;flex-direction:column;gap:10px">'+logoBlock+'<input type="file" id="f-logo-file" accept="image/*" style="display:none"/><input type="hidden" id="f-logo" value="'+(d.logoUrl||"")+'"/></div></div>'+
        '<button class="btn btn-gold btn-full" id="save-brand"><i class="ti ti-device-floppy"></i> บันทึกแบรนด์</button>';
    }
    if(S.modal==="stock"){
      const p=S.products.find(x=>x.docId===d.docId);
      title="ปรับสต็อก";
      body='<div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:16px;text-align:center;margin-bottom:16px"><div style="font-size:12px;color:var(--text3);margin-bottom:6px">'+(p?.name||"")+'</div><div style="font-size:36px;font-weight:800;color:var(--text)">'+(p?.stock||0)+' <span style="font-size:14px;color:var(--text3)">ชิ้น</span></div></div>'+
        '<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:16px">'+[-50,-10,-5,-1,1,5,10,50].map(n=>'<button class="btn '+(n<0?"btn-red":"btn-green")+' sk-d" data-n="'+n+'" style="min-width:54px">'+(n>0?"+":"")+n+'</button>').join("")+'</div>'+
        '<div class="form-group"><label class="form-label">ตั้งค่าโดยตรง</label><input class="form-input" id="f-stk" type="number" placeholder="'+(p?.stock||0)+'" style="text-align:center;font-size:20px;font-weight:700"/></div>'+
        '<button class="btn btn-gold btn-full" id="save-stk"><i class="ti ti-device-floppy"></i> อัปเดตสต็อก</button>';
    }
    return'<div class="modal-ov" id="modal-ov"><div class="modal"><div class="modal-head"><div class="modal-title">'+title+'</div><button class="modal-close" id="close-modal"><i class="ti ti-x"></i></button></div>'+body+'</div></div>';
  }

  function confirmHTML(){
    const c=S.confirm;
    return'<div class="confirm-ov"><div class="confirm-box"><div class="confirm-ico"><i class="ti ti-trash" style="font-size:38px;color:var(--red);"></i></div><div class="confirm-ttl">'+c.title+'</div><div class="confirm-dsc">'+c.desc+'</div><div class="confirm-row"><button class="btn btn-gray btn-full" id="c-cancel">ยกเลิก</button><button class="btn btn-red btn-full" id="c-ok">'+(c.ok||"ยืนยัน")+'</button></div></div></div>';
  }

  function bindMain(){
    // ── start realtime listener ──
    startOrdersListener();

    document.querySelectorAll(".tab").forEach(el=>el.addEventListener("click",async()=>{
      if(!isSuperAdmin())return;
      if(el.dataset.tab==="orders")S.orders=await loadOrders();
      set({tab:el.dataset.tab});
    }));
    document.getElementById("refresh-orders")?.addEventListener("click",async()=>{
      const btn=document.getElementById("refresh-orders");
      if(btn){btn.disabled=true;btn.innerHTML='<i class="ti ti-loader"></i> โหลด...';}
      await refreshOrders(true);
      if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-refresh"></i> รีเฟรช';}
    });

    // ── filter buttons ──
    document.querySelectorAll("[data-fil]").forEach(el=>el.addEventListener("click",()=>{
      S.orderFilter=el.dataset.fil;set({});
    }));

    // ── กดดูรายละเอียดออเดอร์ ──
    document.querySelectorAll("[data-view-order]").forEach(el=>el.addEventListener("click",()=>{
      orderDetailModal(el.dataset.viewOrder);
    }));
    // ── brand bar filter (หน้าสินค้า) ──
    document.querySelectorAll("[data-pbrand]").forEach(el=>el.addEventListener("click",()=>{
      S.activeProdBrand=el.dataset.pbrand;set({});
    }));

    // ── กดการ์ดสินค้า compact → เปิด edit modal ──
    document.querySelectorAll(".prod-card-compact[data-ep]").forEach(el=>el.addEventListener("click",e=>{
      e.stopPropagation();
      const p=S.products.find(x=>x.docId===el.dataset.ep);
      if(p) set({modal:"edit_prod",mdata:{...p}});
    }));

    if(isSuperAdmin()){
      document.getElementById("add-prod")?.addEventListener("click",()=>set({modal:"add_prod",mdata:{active:true,brand:S.brands[0]?.key}}));
      document.getElementById("add-brand")?.addEventListener("click",()=>set({modal:"add_brand",mdata:{}}));
      document.querySelectorAll("[data-ep]").forEach(el=>el.addEventListener("click",()=>{const p=S.products.find(x=>x.docId===el.dataset.ep);set({modal:"edit_prod",mdata:{...p}});}));
      document.querySelectorAll("[data-sp]").forEach(el=>el.addEventListener("click",()=>set({modal:"stock",mdata:{docId:el.dataset.sp}})));
      document.querySelectorAll("[data-tp]").forEach(el=>el.addEventListener("click",async()=>{const p=S.products.find(x=>x.docId===el.dataset.tp);await saveProd({active:!p.active},p.docId);S.products=await loadProducts();set({});toast(p.active?"ซ่อนสินค้าแล้ว":"แสดงสินค้าแล้ว");}));
      document.querySelectorAll("[data-dp]").forEach(el=>el.addEventListener("click",()=>set({confirm:{title:"ลบสินค้า?",desc:'"'+el.dataset.dn+'"\nไม่สามารถกู้คืนได้',ok:"ลบ",onOk:async()=>{await delProd(el.dataset.dp);S.products=await loadProducts();set({confirm:null});toast("ลบสินค้าแล้ว","error");}}})));
      // ── กดทั้ง brand card → เปิด edit modal ──
      document.querySelectorAll(".brand-admin[data-eb]").forEach(el=>el.addEventListener("click",e=>{
        // ถ้ากดปุ่มลบ ไม่เปิด modal
        if(e.target.closest("[data-db]")) return;
        const b=S.brands.find(x=>x.docId===el.dataset.eb);
        if(b) set({modal:"edit_brand",mdata:{...b}});
      }));
      document.querySelectorAll("[data-db]").forEach(el=>el.addEventListener("click",e=>{
        e.stopPropagation();
        set({confirm:{title:"ลบแบรนด์?",desc:'"'+el.dataset.dbn+'"\nสินค้าในแบรนด์จะยังอยู่',ok:"ลบ",onOk:async()=>{await delBrand(el.dataset.db);S.brands=await loadBrands();set({confirm:null});toast("ลบแบรนด์แล้ว","error");}}});
      }));
      document.querySelectorAll("[data-co]").forEach(el=>el.addEventListener("click",async()=>{
        await updateDoc(doc(db,"orders",el.dataset.co),{status:"ยืนยันแล้ว",confirmedAt:serverTimestamp()});
        S.orders=await loadOrders();
        set({modal:null,mdata:{}});
        toast("ยืนยันออเดอร์แล้ว");
      }));
      document.querySelectorAll("[data-ro]").forEach(el=>el.addEventListener("click",async()=>{
        await updateDoc(doc(db,"orders",el.dataset.ro),{status:"ปฏิเสธ"});
        S.orders=await loadOrders();
        set({modal:null,mdata:{}});
        toast("ปฏิเสธออเดอร์แล้ว","error");
      }));
      document.getElementById("save-bank-btn")?.addEventListener("click",async()=>{
        const bankName=document.getElementById("s-bank-name")?.value.trim();
        const accountNumber=document.getElementById("s-acc-num")?.value.trim();
        const accountHolder=document.getElementById("s-acc-holder")?.value.trim();
        const logoUrl=document.getElementById("s-bank-logo")?.value||"";
        if(!bankName||!accountNumber||!accountHolder)return toast("กรุณากรอกข้อมูลให้ครบครับ","error");
        const btn=document.getElementById("save-bank-btn");
        btn.disabled=true;btn.textContent="กำลังบันทึก...";
        try{
          await saveBank({bankName,accountNumber,accountHolder,logoUrl});
          S.bank={bankName,accountNumber,accountHolder,logoUrl};
          toast("บันทึกข้อมูลบัญชีแล้วค่ะ");set({tab:"settings"});
        }catch(e){btn.disabled=false;btn.innerHTML='<i class="ti ti-device-floppy"></i> บันทึกข้อมูลบัญชี';toast("บันทึกไม่สำเร็จ","error");}
      });
      document.getElementById("s-bank-logo-file")?.addEventListener("change",async e=>{
        const f=e.target.files[0];if(!f)return;
        try{
          const b64=await cropCompressBank(f);
          document.getElementById("s-bank-logo").value=b64;
          const wrap=document.getElementById("bank-logo-wrap");
          wrap.innerHTML=
            '<div style="display:flex;align-items:center;gap:12px;">'+
              '<div style="position:relative;width:72px;height:72px;flex-shrink:0;">'+
                '<img id="bank-logo-preview" src="'+b64+'" style="width:72px;height:72px;border-radius:var(--r);object-fit:contain;border:1px solid var(--border);background:var(--bg4);"/>'+
                '<button style="position:absolute;inset:0;background:rgba(0,0,0,.6);border-radius:var(--r);border:none;color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;" onclick="document.getElementById(\'s-bank-logo-file\').click()"><i class="ti ti-camera" style="font-size:14px;"></i>เปลี่ยน</button>'+
              '</div>'+
              '<div>'+
                '<div style="font-size:12px;color:var(--green);display:flex;align-items:center;gap:4px;margin-bottom:4px;"><i class="ti ti-circle-check"></i> อัปโหลดแล้ว</div>'+
                '<div style="font-size:11px;color:var(--text3);">300×300px PNG · คมชัด</div>'+
              '</div>'+
            '</div>'+
            '<input type="file" id="s-bank-logo-file" accept="image/png,image/jpeg,image/webp" style="display:none"/>'+
            '<input type="hidden" id="s-bank-logo" value="'+b64+'"/>';
          // rebind file input
          document.getElementById("s-bank-logo-file")?.addEventListener("change",async ev=>{
            const f2=ev.target.files[0];if(!f2)return;
            const b642=await cropCompressBank(f2);
            document.getElementById("s-bank-logo").value=b642;
            const prev=document.getElementById("bank-logo-preview");
            if(prev)prev.src=b642;
          });
          toast("อัปโหลดโลโก้แล้วค่ะ (300×300px)");
        }catch(err){toast("อัปโหลดไม่ได้ครับ","error");}
      });
    }
    document.querySelectorAll("[data-send-trk]").forEach(el=>el.addEventListener("click",async()=>{
      const docId=el.dataset.sendTrk,chatId=el.dataset.cid,orderId=el.dataset.oid;
      const link=document.getElementById("trk-"+docId)?.value.trim();
      if(!link)return toast("กรุณาวางลิงก์ติดตามก่อนครับ","error");
      if(!link.startsWith("http"))return toast("ลิงก์ต้องขึ้นต้นด้วย http ครับ","error");
      if(!chatId||chatId==="guest")return toast("ไม่พบ Chat ID ลูกค้าครับ","error");
      el.disabled=true;el.textContent="กำลังส่ง...";
      try{
        const res=await fetch("https://api.telegram.org/bot"+BOT+"/sendMessage",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({chat_id:chatId,parse_mode:"Markdown",text:"🛵 *Rider กำลังมาส่งสินค้าค่ะ!*\n\n📋 เลขออเดอร์: *"+orderId+"*\n\n🔗 ติดตามสถานะการจัดส่ง:\n"+link+"\n\nกรุณาเตรียมเงินสดไว้ชำระค่าส่งด้วยนะคะ 😊"})});
        const result=await res.json();
        if(!result.ok)throw new Error(result.description||"Telegram error");
        for(const sid of SUPERADMIN_IDS){
          await fetch("https://api.telegram.org/bot"+BOT+"/sendMessage",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({chat_id:sid,parse_mode:"Markdown",text:"📦 *อัปเดตการจัดส่ง*\n\n📋 ออเดอร์: *"+orderId+"*\n🔗 ลิงก์ติดตาม:\n"+link})});
        }
        await updateDoc(doc(db,"orders",docId),{trackingUrl:link,trackingSentAt:serverTimestamp(),status:"จัดส่งแล้ว"});
        S.orders=await loadOrders();set({modal:null,mdata:{}});
        toast("ส่งลิงก์ให้ลูกค้า + superadmin แล้วค่ะ");
      }catch(e){el.disabled=false;el.innerHTML='<i class="ti ti-send"></i> ส่งให้ลูกค้า';toast("ส่งไม่ได้: "+e.message,"error");}
    }));
  }

  function bindModal(){
    document.getElementById("close-modal")?.addEventListener("click",()=>set({modal:null,mdata:{}}));
    document.getElementById("modal-ov")?.addEventListener("click",e=>{if(e.target.id==="modal-ov")set({modal:null,mdata:{}});});
    document.getElementById("f-img-file")?.addEventListener("change",async e=>{const f=e.target.files[0];if(!f)return;try{const b64=await cropCompress(f,600,0.78);document.getElementById("f-img").value=b64;const wrap=document.getElementById("prod-img-wrap");wrap.innerHTML='<div class="prod-img-preview"><img id="prod-img-el" src="'+b64+'"/><button class="prod-img-preview-btn" onclick="document.getElementById(\'f-img-file\').click()">เปลี่ยน</button></div><input type="file" id="f-img-file" accept="image/*" style="display:none"/><input type="hidden" id="f-img" value="'+b64+'"/>';toast("ประมวลผลรูปแล้ว");}catch{toast("ประมวลผลรูปไม่ได้ครับ","error");}});
    document.getElementById("f-logo-file")?.addEventListener("change",async e=>{const f=e.target.files[0];if(!f)return;try{const b64=await cropCompress(f,400,0.82);document.getElementById("f-logo").value=b64;const wrap=document.getElementById("logo-wrap");wrap.innerHTML='<div class="logo-preview-wrap"><img class="logo-preview-img" id="logo-preview" src="'+b64+'"/><button class="logo-preview-change" onclick="document.getElementById(\'f-logo-file\').click()">เปลี่ยน Logo</button></div><input type="file" id="f-logo-file" accept="image/*" style="display:none"/><input type="hidden" id="f-logo" value="'+b64+'"/>';toast("อัปโหลด Logo แล้ว");}catch{toast("อัปโหลด Logo ไม่ได้ครับ","error");}});
    document.getElementById("f-toggle")?.addEventListener("click",()=>{const btn=document.getElementById("f-toggle");const knob=btn?.querySelector(".toggle-knob");const nv=S.mdata.active===false;btn.style.background=nv?"var(--gold)":"var(--bg5)";knob.style.left=nv?"22px":"3px";S.mdata.active=nv;});
    document.getElementById("save-prod")?.addEventListener("click",async()=>{const data={brand:document.getElementById("f-brand")?.value,name:document.getElementById("f-name")?.value.trim(),price:Number(document.getElementById("f-price")?.value),stock:Number(document.getElementById("f-stock")?.value||0),imageUrl:document.getElementById("f-img")?.value||"",description:document.getElementById("f-desc")?.value.trim(),active:S.mdata.active!==false};if(!data.name||!data.price)return toast("กรุณากรอกชื่อและราคาครับ","error");if(!data.id&&S.modal==="add_prod"){const px=(data.brand||"XX").slice(0,2).toUpperCase();data.id=px+Date.now().toString().slice(-4);}await saveProd(data,S.modal==="edit_prod"?S.mdata.docId:null);S.products=await loadProducts();set({modal:null,mdata:{}});toast("บันทึกสินค้าแล้ว");});
    document.getElementById("save-brand")?.addEventListener("click",async()=>{const name=document.getElementById("f-bname")?.value.trim();const desc=document.getElementById("f-bdesc")?.value.trim();const logo=document.getElementById("f-logo")?.value||"";if(!name)return toast("กรุณากรอกชื่อแบรนด์ครับ","error");const key=S.modal==="edit_brand"?S.mdata.key:name.toLowerCase().replace(/[^a-z0-9]/g,"").slice(0,12)||"brand"+Date.now();await saveBrand({key,name,desc,logoUrl:logo,emoji:""},S.modal==="edit_brand"?S.mdata.docId:null);S.brands=await loadBrands();set({modal:null,mdata:{}});toast("บันทึกแบรนด์แล้ว");});
    document.querySelectorAll(".sk-d").forEach(el=>el.addEventListener("click",()=>{const p=S.products.find(x=>x.docId===S.mdata.docId);const cur=Number(document.getElementById("f-stk")?.value)||p?.stock||0;document.getElementById("f-stk").value=Math.max(0,cur+Number(el.dataset.n));}));
    document.getElementById("save-stk")?.addEventListener("click",async()=>{const p=S.products.find(x=>x.docId===S.mdata.docId);const nv=Number(document.getElementById("f-stk")?.value);if(isNaN(nv)||nv<0)return toast("จำนวนไม่ถูกต้องครับ","error");await saveProd({stock:nv},p.docId);S.products=await loadProducts();set({modal:null,mdata:{}});toast("อัปเดตสต็อกแล้ว");});
  }

  function bindConfirm(){
    document.getElementById("c-cancel")?.addEventListener("click",()=>set({confirm:null}));
    document.getElementById("c-ok")?.addEventListener("click",()=>S.confirm?.onOk?.());
  }

  async function init(){
    set({view:"loading"});
    try{
      const auth=await checkAuth();
      if(auth===true){await loadAll();set({view:"main"});}
      else if(auth==="browser"){set({view:"browser"});}
      else{set({view:"denied"});}
    }catch(e){console.error("init:",e);set({view:"browser"});}
  }

  if(tg){tg.expand();tg.ready();}
  init();
</script>
</body>
</html>
